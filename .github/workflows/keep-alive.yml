name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://YOUR-APP.onrender.com/api/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS"
          fi
